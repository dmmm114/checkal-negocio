<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700"
     font-family="'Plus Jakarta Sans','Trebuchet MS','Segoe UI',system-ui,sans-serif">
  <rect width="980" height="700" fill="#FFFFFF"/>
  <text x="60" y="50" font-size="22" font-weight="800" fill="#0F172A">CheckAL — ✓ à esquerda: o ✓ É «Check» → ✓AL lê-se «CheckAL»</text>
  <text x="60" y="76" font-size="14" fill="#475569">o símbolo soletra a marca (rebus) · logo limpo p/ tamanhos pequenos + versão com slogan p/ marketing</text>
  <line x1="60" y1="94" x2="920" y2="94" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ===== Símbolo: badge ✓AL ===== -->
  <text x="180" y="128" font-size="13" font-weight="700" fill="#94A3B8" text-anchor="middle">SÍMBOLO · badge ✓AL</text>
  <rect x="90" y="150" width="200" height="200" rx="54" fill="#0F172A"/>
  <g transform="translate(112,196) scale(0.72)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="19" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="222" y="284" font-size="86" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">AL</text>
  <text x="190" y="382" font-size="13" fill="#475569" text-anchor="middle">✓ («Check») + AL · o app-icon / selo</text>

  <!-- ===== Versão sem caixa ===== -->
  <text x="560" y="128" font-size="13" font-weight="700" fill="#94A3B8" text-anchor="middle">SEM CAIXA</text>
  <g transform="translate(400,200) scale(1.15)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="620" y="300" font-size="110" font-weight="800" fill="#0F172A" text-anchor="middle" letter-spacing="-3">AL</text>
  <text x="560" y="382" font-size="13" fill="#475569" text-anchor="middle">o ✓ verde antes do AL grafite</text>

  <line x1="60" y1="418" x2="920" y2="418" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ===== Logótipo limpo (badge + wordmark) ===== -->
  <text x="60" y="452" font-size="13" font-weight="700" fill="#94A3B8">LOGÓTIPO (limpo — favicon, app, tamanhos pequenos)</text>
  <rect x="66" y="470" width="96" height="96" rx="26" fill="#0F172A"/>
  <g transform="translate(78,492) scale(0.34)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="130" y="546" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">AL</text>
  <text x="192" y="536" font-size="56" font-weight="800" fill="#0F172A" letter-spacing="-2">CheckAL</text>

  <!-- ===== Logótipo com slogan (hero, cartão) ===== -->
  <text x="560" y="452" font-size="13" font-weight="700" fill="#94A3B8">COM SLOGAN (hero da landing, cartão, 1.º contacto)</text>
  <rect x="566" y="470" width="96" height="96" rx="26" fill="#0F172A"/>
  <g transform="translate(578,492) scale(0.34)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="630" y="546" font-size="42" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">AL</text>
  <text x="692" y="524" font-size="56" font-weight="800" fill="#0F172A" letter-spacing="-2">CheckAL</text>
  <text x="694" y="562" font-size="24" font-weight="600" fill="#475569">O teu AL? <tspan font-weight="800" fill="#0F172A">Check.</tspan></text>

  <line x1="60" y1="600" x2="920" y2="600" stroke="#E2E8F0" stroke-width="2"/>
  <text x="60" y="636" font-size="14" fill="#475569">Regra de uso: o <tspan font-weight="700" fill="#0F172A">logo limpo</tspan> é o oficial (escala até favicon). O <tspan font-weight="700" fill="#0F172A">slogan</tspan> só na 1.ª impressão (hero/cartão), nunca em ícone pequeno.</text>
  <text x="60" y="662" font-size="14" fill="#475569">Cor por decidir: grafite (recomendo) ou o nosso azul #2563EB. O ✓ verde é sempre o herói.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 980"
     font-family="'Plus Jakarta Sans','Trebuchet MS','Segoe UI',system-ui,sans-serif">
  <rect width="980" height="980" fill="#FFFFFF"/>
  <text x="60" y="56" font-size="22" font-weight="800" fill="#0F172A">CheckAL — logótipo · variantes para aprovação</text>
  <text x="60" y="82" font-size="14" fill="#94A3B8">grafite #0F172A · verde-check #12B76A · fonte final Plus Jakarta Sans ExtraBold</text>
  <line x1="60" y1="100" x2="920" y2="100" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ===== 1. PRIMÁRIO HORIZONTAL ===== -->
  <text x="60" y="140" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">1 · PRIMÁRIO (horizontal)</text>
  <text x="60" y="228" font-size="96" font-weight="800" fill="#0F172A" letter-spacing="-3">CheckAL</text>
  <g transform="translate(470,158) scale(0.74)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="62" y="262" font-size="17" font-weight="500" fill="#475569" letter-spacing="1">monitorização de Alojamento Local</text>
  <line x1="60" y1="300" x2="920" y2="300" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ===== 2. EMPILHADO · 3. MONOGRAMA k✓ · 4. SÍMBOLO ===== -->
  <text x="60" y="336" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">2 · EMPILHADO</text>
  <rect x="118" y="356" width="96" height="96" rx="28" fill="#0F172A"/>
  <g transform="translate(140,378) scale(0.56)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="166" y="500" font-size="40" font-weight="800" fill="#0F172A" text-anchor="middle" letter-spacing="-1">CheckAL</text>

  <text x="380" y="336" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">3 · MONOGRAMA k✓ (app-icon)</text>
  <rect x="392" y="356" width="150" height="150" rx="42" fill="#F1F5F9"/>
  <g transform="translate(430,378)" stroke-linecap="round" stroke-linejoin="round">
    <rect x="12" y="8" width="20" height="104" rx="9" fill="#0F172A"/>
    <path d="M22,64 L66,114" fill="none" stroke="#0F172A" stroke-width="20"/>
    <path d="M4,40 L22,64 L92,-2" fill="none" stroke="#12B76A" stroke-width="20"/>
  </g>
  <text x="467" y="536" font-size="13" fill="#475569" text-anchor="middle">o «k» é o check</text>

  <text x="640" y="336" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">4 · SÍMBOLO ✓</text>
  <g transform="translate(690,372) scale(1.15)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <line x1="60" y1="560" x2="920" y2="560" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ===== 5. MONOCROMÁTICO · 6. NEGATIVO ===== -->
  <text x="60" y="596" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">5 · MONOCROMÁTICO (1 cor)</text>
  <text x="60" y="672" font-size="76" font-weight="800" fill="#0F172A" letter-spacing="-2">CheckAL</text>
  <g transform="translate(388,616) scale(0.58)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#0F172A" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="520" y="596" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">6 · NEGATIVO (fundo escuro)</text>
  <rect x="520" y="612" width="400" height="92" rx="14" fill="#0F172A"/>
  <text x="548" y="672" font-size="60" font-weight="800" fill="#FFFFFF" letter-spacing="-2">CheckAL</text>
  <g transform="translate(788,628) scale(0.46)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <line x1="60" y1="740" x2="920" y2="740" stroke="#E2E8F0" stroke-width="2"/>

  <!-- ===== 7. ESPAÇO DE PROTEÇÃO + TAMANHO MÍNIMO ===== -->
  <text x="60" y="776" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1">7 · ESPAÇO DE PROTEÇÃO (= altura do ✓) · TAMANHO MÍNIMO</text>
  <rect x="60" y="800" width="360" height="120" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 6"/>
  <rect x="96" y="836" width="288" height="48" fill="none" stroke="#E2E8F0" stroke-width="1"/>
  <text x="112" y="874" font-size="42" font-weight="800" fill="#0F172A" letter-spacing="-1">CheckAL</text>
  <g transform="translate(330,846) scale(0.32)">
    <path d="M12,54 L40,84 L92,12" fill="none" stroke="#12B76A" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="470" y="836" font-size="15" fill="#475569">Mínimo legível: ~22px de altura (ecrã) · 16mm (impresso).</text>
  <text x="470" y="862" font-size="15" fill="#475569">Nunca esticar, rodar, mudar de cor o ✓, nem separar "Check AL".</text>
  <text x="470" y="888" font-size="15" fill="#475569">Espaço à volta ≥ à altura do ✓ em qualquer lado.</text>
</svg>
